
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Grace Devotional</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var isDark = saved ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { colors: {
          'midnight-blue': '#111a6f',
          'vivid-royal':  '#3a0ca3',
          'blue-violet':  '#7a3bdf',
          'amber-gold':   '#ffc01c',
          'deep-saffron': '#ff9105',
        } } }
      };
    </script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Avenir Next", "Helvetica Neue", Arial, "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #ffffff;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        html.dark body { background-color: #0b1147; } /* deep base blue */
        .serif-font {
            font-family: 'Noto Serif KR', serif;
        }
        .noto-sans {
            font-family: 'Noto Sans KR', sans-serif;
        }
        /* 영문 전용 가독성 최적화 */
        .eng-font {
            font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.01em;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script type="importmap">

}
